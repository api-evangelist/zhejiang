---
aid: zhejiang
name: Zhejiang University
description: >-
  Zhejiang University (ZJU) is a comprehensive public research university based
  in Hangzhou, Zhejiang Province, China, ranked #44 in the QS World University
  Rankings 2025. ZJU is one of China's oldest and most selective institutions,
  with strengths across AI, engineering, medicine, and the sciences. ZJU does
  not publish a centralized, public developer portal or documented open API
  program. Its confirmable public technical surface is limited to infrastructure
  endpoints: a unified identity / single sign-on (CAS + Shibboleth SAML IdP)
  platform and a community-run open-source software mirror, alongside numerous
  research-lab GitHub organizations. No open, self-service application APIs were
  found at the time of review.
