apis:
  - aid: zhejiang:sso
    name: Unified Identity Authentication (CAS / SSO)
    description: >-
      Zhejiang University's unified identity authentication platform, a Central
      Authentication Service (CAS) single sign-on login used to access campus
      systems. It supports username/password, QR-code scanning, and third-party
      login (DingTalk, QQ, WeChat, Azure/Microsoft for international campus).
      This is an internal SSO gateway, not a self-service public API; no public
      developer documentation is published.
    humanURL: https://zjuam.zju.edu.cn/cas/login?locale=en
    baseURL: https://zjuam.zju.edu.cn/cas/
    tags: [ Identity, SSO, Authentication, CAS ]
    properties:
      - type: Documentation
        url: https://zjuam.zju.edu.cn/cas/login?locale=en
      - type: Authentication
        url: https://zjuam.zju.edu.cn/cas/login?locale=en
  - aid: zhejiang:shibboleth
    name: Shibboleth Identity Provider (SAML)
    description: >-
      Zhejiang University operates a Shibboleth SAML 2.0 Identity Provider
      (entityID https://idp.zju.edu.cn/idp/shibboleth) used for federated
      single sign-on to external academic resources and services. This is a
      standards-based federation endpoint rather than a documented public API.
    humanURL: https://idp.zju.edu.cn/idp/shibboleth
    baseURL: https://idp.zju.edu.cn/idp/
    tags: [ Identity, SSO, SAML, Shibboleth, Federation ]
    properties:
      - type: Documentation
        url: https://idp.zju.edu.cn/idp/shibboleth
      - type: Authentication
        url: https://idp.zju.edu.cn/idp/shibboleth
  - aid: zhejiang:mirrors
    name: ZJU Open Source Software Mirrors
    description: >-
      A community-maintained (LUG@ZJU) open-source software mirror service that
      hosts and serves Linux distribution and software package repositories.
      It is an rsync/HTTP file-mirror service rather than a programmable
      application API; the maintaining scripts are open source on GitHub.
    humanURL: https://mirrors.zju.edu.cn/
    baseURL: https://mirrors.zju.edu.cn/
    tags: [ Mirror, Open Source, Infrastructure ]
    properties:
      - type: Documentation
        url: https://mirrors.zju.edu.cn/
      - type: GitHub
        url: https://github.com/zjulug
